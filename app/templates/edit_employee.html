<!DOCTYPE html>
<html>

<head>

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>Edit Employee</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
class="form-control"
type="text"
name="name"
value="{{ employee.name }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
type="email"
name="email"
value="{{ employee.email }}"
required>

</div>

<div class="mb-3">

<label>Department</label>

<input
class="form-control"
type="text"
name="department"
value="{{ employee.department }}"
required>

</div>

<div class="mb-3">

<label>Salary</label>

<input
class="form-control"
type="number"
name="salary"
value="{{ employee.salary }}"
required>

</div>

<button class="btn btn-warning">

Update Employee

</button>

<a href="/" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
